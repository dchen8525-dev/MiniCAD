<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniCAD STEP Viewer</title>
    <style>
        :root {
            --bg: #f2efe8;
            --panel: rgba(255, 251, 245, 0.9);
            --panel-border: rgba(63, 58, 46, 0.15);
            --text: #2d2a26;
            --muted: #6b665d;
            --accent: #c45f35;
            --accent-dark: #8f3f20;
            --canvas: #dfe7e8;
            --app-width: min(96vw, 1500px);
            --app-height: min(92dvh, 960px);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 1.5rem;
            font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(196, 95, 53, 0.18), transparent 24rem),
                radial-gradient(circle at bottom right, rgba(66, 118, 128, 0.15), transparent 28rem),
                linear-gradient(135deg, #efe8da 0%, #f8f5ef 55%, #e7eceb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .layout {
            display: grid;
            grid-template-columns: 22rem 1fr;
            width: var(--app-width);
            min-height: var(--app-height);
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(63, 58, 46, 0.08);
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(53, 47, 39, 0.12);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.25rem;
            background: var(--panel);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--panel-border);
        }

        .title {
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 0.02em;
        }

        .subtitle {
            margin: 0.25rem 0 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .controls,
        .stats,
        .status-card,
        .selection-card {
            padding: 1rem;
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.56);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        button,
        input[type="file"]::file-selector-button {
            border: none;
            border-radius: 999px;
            padding: 0.7rem 1rem;
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: transform 120ms ease, background 120ms ease;
        }

        button.secondary {
            background: #54646a;
        }

        button:hover,
        input[type="file"]::file-selector-button:hover {
            transform: translateY(-1px);
            background: var(--accent-dark);
        }

        input[type="file"] {
            width: 100%;
            color: var(--muted);
        }

        select {
            width: 100%;
            margin-bottom: 0.75rem;
            border: 1px solid var(--panel-border);
            border-radius: 0.85rem;
            padding: 0.7rem 0.9rem;
            color: var(--text);
            background: rgba(255, 255, 255, 0.9);
        }

        textarea {
            width: 100%;
            min-height: 17rem;
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            resize: vertical;
            font: 0.9rem/1.45 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            color: var(--text);
            background: rgba(255, 255, 255, 0.9);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .stat-label {
            display: block;
            color: var(--muted);
            font-size: 0.8rem;
            margin-bottom: 0.15rem;
        }

        .stat-value {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .status-card p {
            margin: 0;
            line-height: 1.5;
        }

        .selection-card h2 {
            margin: 0 0 0.55rem;
            font-size: 1rem;
        }

        .selection-card dl {
            margin: 0;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.45rem 0.75rem;
            font-size: 0.92rem;
        }

        .selection-card dt {
            color: var(--muted);
        }

        .selection-card dd {
            margin: 0;
            word-break: break-word;
        }

        .viewer {
            position: relative;
            background:
                radial-gradient(circle at center, rgba(255, 255, 255, 0.4), transparent 32rem),
                var(--canvas);
            min-height: 0;
        }

        #scene {
            width: 100%;
            height: 100%;
            min-height: var(--app-height);
        }

        .overlay {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            background: rgba(28, 39, 44, 0.72);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.88rem;
            letter-spacing: 0.02em;
        }

        @media (max-width: 960px) {
            body {
                padding: 0.75rem;
                align-items: stretch;
            }

            .layout {
                grid-template-columns: 1fr;
                width: 100%;
                min-height: calc(100dvh - 1.5rem);
                border-radius: 1.1rem;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--panel-border);
            }

            #scene {
                min-height: 58dvh;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <header>
            <h1 class="title">MiniCAD STEP Viewer</h1>
            <p class="subtitle">原生 JavaScript + Three.js。当前支持直线边、平面面和简单闭合环预览。</p>
        </header>

        <section class="controls">
            <select id="example-select">
                <option value="minimal-square">minimal-square</option>
                <option value="plate-with-round-hole">plate-with-round-hole</option>
            </select>
            <div class="actions">
                <button id="load-example">加载示例</button>
                <button id="render-button" class="secondary">解析并渲染</button>
            </div>
            <input id="file-input" type="file" accept=".step,.stp,.txt">
            <textarea id="step-input" spellcheck="false" placeholder="在这里粘贴 STEP 内容，或直接上传 .step 文件"></textarea>
        </section>

        <section class="stats" id="stats">
            <div><span class="stat-label">Entities</span><span class="stat-value" data-stat="entityCount">0</span></div>
            <div><span class="stat-label">Solids</span><span class="stat-value" data-stat="solidCount">0</span></div>
            <div><span class="stat-label">Shells</span><span class="stat-value" data-stat="shellCount">0</span></div>
            <div><span class="stat-label">Faces</span><span class="stat-value" data-stat="faceCount">0</span></div>
            <div><span class="stat-label">Edges</span><span class="stat-value" data-stat="edgeCount">0</span></div>
            <div><span class="stat-label">Unsupported</span><span class="stat-value" data-stat="unsupportedFaceCount">0</span></div>
        </section>

        <section class="status-card">
            <p id="status-text">等待输入 STEP 数据。</p>
        </section>

        <section class="selection-card">
            <h2>当前选中</h2>
            <dl id="selection-details">
                <dt>类型</dt><dd>未选中</dd>
                <dt>说明</dt><dd>点击右侧模型中的面或边查看详情。</dd>
            </dl>
        </section>
    </aside>

    <main class="viewer">
        <div id="scene"></div>
        <div class="overlay">左键旋转 / 右键平移 / 滚轮缩放</div>
    </main>
</div>

<script type="importmap">
{
  "imports": {
    "three": "/vendor/three/build/three.module.js",
    "three/addons/": "/vendor/three/examples/jsm/"
  }
}
</script>
<script type="module" src="/viewer.js"></script>
</body>
</html>
